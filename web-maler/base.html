<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Default Title{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 90%; /* Bruk 90% av skjermbredden */
            max-width: 1000px; /* Maks bredde for store skjermer */
            overflow-x: auto; /* Legg til rullefelt hvis innholdet er for bredt */
            margin: 20px auto;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        a {
            text-decoration: none;
            color: #007BFF;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Stil for registreringsrader */
        .detection-row {
            display: flex;
            flex-wrap: wrap; /* Gjør at elementene flyter til neste linje hvis plassen er liten */
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        /* Venstre del: Metadata */
        .detection-metadata {
            flex: 1; /* Tar opp tilgjengelig plass */
            min-width: 200px; /* Minimum bredde for metadata */
            margin-right: 20px;
        }

        /* Høyre del: Avspiller */
        .detection-player {
            flex: 1; /* Tar opp tilgjengelig plass */
            min-width: 200px; /* Minimum bredde for avspilleren */
        }

        /* Responsiv design for små skjermer */
        @media (max-width: 600px) {
            .detection-row {
                flex-direction: column; /* Legg elementene oppå hverandre */
            }

            .detection-metadata,
            .detection-player {
                margin-right: 0; /* Fjern margin mellom elementene */
            }
        }

        /* Generell styling for kalender */
        .calendar {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }

        .calendar th {
            padding: 10px;
            border-bottom: 2px solid #ddd;
            text-align: center;
            font-weight: bold;
        }

        .calendar td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .calendar td a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .calendar td span {
            color: #aaa;
        }

        .calendar th:nth-child(6),
        .calendar th:nth-child(7),
        .calendar td:nth-child(6) a,
        .calendar td:nth-child(7) a {
            color: #d9534f; /* Rød farge for lørdag og søndag */
        }

        .month-navigation {
            text-align: center;
            margin-bottom: 20px;
        }

        .month-navigation a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            margin: 0 20px;
        }

        .month-navigation .current-month {
            font-size: 1.5em;
            font-weight: bold;
        }

        /* Generell styling for knapper */
        button {
            padding: 8px 15px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[type="submit"] {
            background-color: #007bff;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        button#select-all {
            background-color: #6c757d;
            color: white;
        }

        button#select-all:hover {
            background-color: #5a6268;
        }

        /* Stil for deaktivert knapp */
        button:disabled {
            background-color: #d6d6d6; /* Utgrået bakgrunnsfarge */
            color: #a1a1a1; /* Lysere tekstfarge */
            cursor: not-allowed; /* Forbudt musepeker */
            opacity: 0.7; /* Gjør knappen litt gjennomsiktig */
        }

        /* Hover-effekt for aktiv knapp */
        button:not(:disabled):hover {
            background-color: #0056b3; /* Mørkere blå farge ved hover */
        }

        /* Responsiv layout for skjema */
        @media (max-width: 768px) {
            .detections-list {
                flex-direction: column;
            }

            .detections-list div {
                margin-bottom: 15px;
            }

            div[style*="justify-content: space-between"] {
                flex-direction: column;
                align-items: flex-start;
            }

            div[style*="justify-content: space-between"] > div {
                margin-bottom: 10px;
            }
        }

        /* Responsiv design for små skjermer */
        @media (max-width: 768px) {
            .container {
                width: 95%; /* Øk bredden til 95% for små skjermer */
                padding: 15px; /* Reduser padding */
            }

            h1, h2 {
                font-size: 1.2em; /* Reduser fontstørrelsen for overskrifter */
            }

            .detection-row {
                flex-direction: column; /* Legg elementene oppå hverandre */
            }

            .detection-metadata,
            .detection-player {
                margin-right: 0; /* Fjern margin mellom elementene */
                margin-bottom: 10px; /* Legg til margin under hvert element */
            }
        }

        @media (max-width: 480px) {
            h1, h2 {
                font-size: 1em; /* Ytterligere reduksjon i fontstørrelse */
            }

            .container {
                padding: 10px; /* Reduser padding ytterligere */
            }

            .detection-row {
                padding: 10px; /* Reduser padding for deteksjonsrader */
            }
        }

        /* Standard layout for bredere skjermer */
        .detection-item {
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
            width: 100%;
        }

        .detection-details {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            width: 100%;
        }

        .detection-details .start-end {
            flex: 1;
            text-align: left;
        }

        .detection-details .confidence {
            flex: 1;
            text-align: left;
        }

        /* Responsiv design for smale skjermer */
        @media (max-width: 768px) {
            .detection-item {
                align-items: center; /* Sentrer alt innhold horisontalt */
            }

            .detection-details {
                flex-wrap: wrap; /* Tillat innhold å bryte til flere linjer */
                justify-content: center; /* Sentrer innholdet */
                text-align: center; /* Sentrer teksten */
            }

            .detection-details .start-end {
                flex: 0 0 50%; /* Start og Slutt tar 50% av bredden */
                margin-bottom: 5px;
                text-align: center; /* Sentrer teksten */
            }

            .detection-details .confidence {
                flex: 0 0 100%; /* Konfidens tar hele bredden */
                margin-top: 5px;
                text-align: center; /* Sentrer teksten */
            }

            .detection-item > div {
                text-align: center; /* Sentrer innholdet i alle underdiver */
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
