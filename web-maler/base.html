<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Default Title{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            min-width: 850px; /* Sett minimum bredde for hele siden */
        }
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            min-width: 850px; /* Sett minimum bredde for container */
        }
        a {
            text-decoration: none;
            color: #007BFF;
        }
        a:hover {
            text-decoration: underline;
        }
        .detection-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .names {
            flex: 1;
            min-width: 150px;
            padding-right: 20px;
        }
        .names strong {
            font-weight: bold;
            font-size: 22px;
        }
        .names em {
            font-style: italic;
            font-size: 22px;
            color: #555;
        }
        .histogram {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 100px; /* Histogrammets høyde */
            border-left: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            margin-top: 20px;
            min-width: 800px; /* Sørg for at histogrammet ikke blir for smalt */
        }
        .bar-container {
            flex: 1;
            text-align: center;
            margin: 0 2px;
            height: 100%; /* Sørg for at bar-container fyller hele høyden til histogram */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Plasser stolpen nederst */
        }
        .bar {
            width: 15px;
            background-color: #d1e7ff;
            transition: background-color 0.3s ease;
            position: relative; /* Gjør det mulig å plassere <a> inni */
            margin-left: auto; /* Sentrer stolpen horisontalt */
            margin-right: auto; /* Sentrer stolpen horisontalt */
        }
        .bar a {
            display: block;
            width: 100%;
            height: 100%; /* Sørg for at <a> fyller hele høyden til .bar */
            position: absolute;
            top: 0;
            left: 0;
            text-decoration: none; /* Fjern standard lenkestil */
        }
        .bar:hover {
            background-color: #007bff;
        }
        .bar-label {
            font-size: 0.7em;
            margin-bottom: 5px;
            display: block;
            transform: rotate(-90deg); /* Roter teksten 90 grader mot klokken */
            transform-origin: center; /* Roter rundt midten av teksten */
            white-space: nowrap; /* Sørg for at teksten ikke brytes */
        }
        .hour-label {
            font-size: 0.7em;
            margin-top: 5px;
            display: block;
        }
        .species-link {
            text-decoration: none;
            color: inherit; /* Bruker normal tekstfarge */
        }

        .species-link:hover {
            color: #007bff; /* Standard lenkefarge ved hover */
            text-decoration: underline; /* Understreker ved hover */
        }

        /* Stil for registreringsrader */
        .detection-row {
            display: flex;
            flex-wrap: wrap; /* Gjør at elementene flyter til neste linje hvis plassen er liten */
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        /* Venstre del: Metadata */
        .detection-metadata {
            flex: 1; /* Tar opp tilgjengelig plass */
            min-width: 200px; /* Minimum bredde for metadata */
            margin-right: 20px;
        }

        /* Høyre del: Avspiller */
        .detection-player {
            flex: 1; /* Tar opp tilgjengelig plass */
            min-width: 200px; /* Minimum bredde for avspilleren */
        }

        /* Responsiv design for små skjermer */
        @media (max-width: 600px) {
            .detection-row {
                flex-direction: column; /* Legg elementene oppå hverandre */
            }

            .detection-metadata,
            .detection-player {
                margin-right: 0; /* Fjern margin mellom elementene */
            }
        }

        /* Generell styling for kalender */
        .calendar {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }

        .calendar th {
            padding: 10px;
            border-bottom: 2px solid #ddd;
            text-align: center;
            font-weight: bold;
        }

        .calendar td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .calendar td a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .calendar td span {
            color: #aaa;
        }

        .calendar th:nth-child(6),
        .calendar th:nth-child(7),
        .calendar td:nth-child(6) a,
        .calendar td:nth-child(7) a {
            color: #d9534f; /* Rød farge for lørdag og søndag */
        }

        .month-navigation {
            text-align: center;
            margin-bottom: 20px;
        }

        .month-navigation a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            margin: 0 20px;
        }

        .month-navigation .current-month {
            font-size: 1.5em;
            font-weight: bold;
        }

        /* Generell styling for knapper */
        button {
            padding: 8px 15px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[type="submit"] {
            background-color: #007bff;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        button#select-all {
            background-color: #6c757d;
            color: white;
        }

        button#select-all:hover {
            background-color: #5a6268;
        }

        /* Stil for deaktivert knapp */
        button:disabled {
            background-color: #d6d6d6; /* Utgrået bakgrunnsfarge */
            color: #a1a1a1; /* Lysere tekstfarge */
            cursor: not-allowed; /* Forbudt musepeker */
            opacity: 0.7; /* Gjør knappen litt gjennomsiktig */
        }

        /* Hover-effekt for aktiv knapp */
        button:not(:disabled):hover {
            background-color: #0056b3; /* Mørkere blå farge ved hover */
        }

        /* Responsiv layout for skjema */
        @media (max-width: 768px) {
            .detections-list {
                flex-direction: column;
            }

            .detections-list div {
                margin-bottom: 15px;
            }

            div[style*="justify-content: space-between"] {
                flex-direction: column;
                align-items: flex-start;
            }

            div[style*="justify-content: space-between"] > div {
                margin-bottom: 10px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
